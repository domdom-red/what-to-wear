<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>오늘 뭐 입지?</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#f0eee9;
}

/* ── App tokens ── */
:root{
  --app-bg-top:#FFE6C4;
  --app-bg-bottom:#FFCDA0;
  --app-accent:#FF8A3D;
  --app-accent-ink:#5C2200;
  --app-ink:#2A1500;
  --app-ink-soft:#6B4A2B;
  --app-card:#FFFFFF;
  --app-card-soft:#FFF6EB;
  --app-line:rgba(92,34,0,0.08);
  --app-pill:rgba(92,34,0,0.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="rain"]{
  --app-bg-top:#C9D8E8;
  --app-bg-bottom:#97AFC8;
  --app-accent:#3F6FB0;
  --app-accent-ink:#0B2A4F;
  --app-ink:#0E1F35;
  --app-ink-soft:#45607E;
  --app-card:#FFFFFF;
  --app-card-soft:#EEF3F8;
  --app-line:rgba(11,42,79,0.08);
  --app-pill:rgba(11,42,79,0.06);
}
[data-theme="snow"]{
  --app-bg-top:#E4EBF5;
  --app-bg-bottom:#C8D8EC;
  --app-accent:#4A7FB5;
  --app-accent-ink:#0B2A4F;
  --app-ink:#0E1F35;
  --app-ink-soft:#45607E;
  --app-card:#FFFFFF;
  --app-card-soft:#EEF3F8;
  --app-line:rgba(11,42,79,0.08);
  --app-pill:rgba(11,42,79,0.06);
}
[data-theme="hot"]{
  --app-bg-top:#FFD28A;
  --app-bg-bottom:#FF9440;
  --app-accent:#D94F00;
  --app-accent-ink:#4A1A00;
  --app-ink:#2A1500;
  --app-ink-soft:#6B4A2B;
  --app-card:#FFFFFF;
  --app-card-soft:#FFF0DB;
  --app-line:rgba(92,34,0,0.08);
  --app-pill:rgba(92,34,0,0.06);
}

/* ── Wrapper ── */
#app-wrapper{
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:var(--md-sys-color-surface,#fef7ff);
}

/* ── App Screen ── */
.app-screen{
  width:100%;height:100%;
  background:linear-gradient(180deg,var(--app-bg-top) 0%,var(--app-bg-bottom) 75%);
  color:var(--app-ink);
  display:flex;flex-direction:column;
  position:absolute;inset:0;
  transition:background 0.6s ease;
}
.app-screen.hidden{display:none}

/* ── Scroll ── */
.app-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.app-scroll::-webkit-scrollbar{display:none}

/* ── Top pad ── */
.top-pad{height:calc(8px + var(--safe-top))}

/* ── App Bar ── */
.app-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px 8px;flex-shrink:0;
}
.app-bar-center{
  flex:1;text-align:center;
  font-size:17px;font-weight:600;letter-spacing:-0.01em;
}
.app-bar-icon-btn{
  width:44px;height:44px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:none;color:var(--app-ink);cursor:pointer;
  transition:opacity .15s;
}
.app-bar-icon-btn:active{opacity:.7}

/* ── Location Pill ── */
.location-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px 6px 10px;border-radius:999px;
  background:rgba(255,255,255,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:13px;font-weight:600;letter-spacing:-0.01em;
  color:var(--app-ink);cursor:pointer;border:none;
  transition:opacity .15s;
}
.location-pill:active{opacity:.7}

/* ── Hero ── */
.hero-row{
  padding:0 20px;
  display:flex;align-items:center;gap:16px;
}
.hero-meta{font-size:12px;color:var(--app-ink-soft);font-weight:400;letter-spacing:-0.005em}
.hero-temp-row{display:flex;align-items:baseline;gap:6px;margin-top:2px}
.hero-temp{
  font-size:56px;font-weight:800;
  letter-spacing:-0.03em;line-height:1.05;
  font-feature-settings:'tnum';
}
.hero-feels{font-size:13px;color:var(--app-ink-soft);font-weight:400}
.hero-catchphrase{
  font-size:18px;font-weight:700;
  letter-spacing:-0.02em;line-height:1.2;
  color:var(--app-accent-ink);margin-top:2px;
}
.hero-illus{flex-shrink:0}

/* ── Section titles ── */
.section-title{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.section-sub{font-size:11px;color:var(--app-ink-soft);font-weight:600}

/* ── Timeline card ── */
.timeline-card{
  margin:16px 20px 0;
  padding:16px 0;
  background:var(--app-card);
  border-radius:24px;
}
.timeline-header{
  padding:0 20px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.timeline-slots{
  display:flex;padding:0 12px;
  justify-content:space-between;
  position:relative;
}
.timeline-slot{
  flex:1;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:8px 4px;
  border-radius:16px;
  position:relative;
  transition:background .2s;
}
.timeline-slot.peak{background:var(--app-card-soft)}
.timeline-slot.past{opacity:.4}
.timeline-slot-time{font-size:11px;font-weight:600;color:var(--app-ink-soft)}
.timeline-slot-dot{
  width:28px;height:28px;border-radius:14px;
  transition:opacity .2s;
}
.timeline-slot-temp{
  font-size:14px;font-weight:600;letter-spacing:-0.01em;
  font-feature-settings:'tnum';
}
.timeline-slot-mood{font-size:10px;color:var(--app-ink-soft);font-weight:600}
.peak-badge{
  position:absolute;top:-8px;
  font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:999px;
  background:var(--app-accent);color:white;
  white-space:nowrap;
}

/* ── Outfit section ── */
.outfit-section{padding:20px 20px 0}
.outfit-header{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:8px;
}
.outfit-title{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.outfit-score{
  font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:999px;
  background:var(--app-card-soft);color:var(--app-accent-ink);
}
.outfit-sub{font-size:13px;color:var(--app-ink-soft);margin-bottom:14px;letter-spacing:-0.005em}
.outfit-list{background:var(--app-card);border-radius:24px;overflow:hidden}
.outfit-item{
  display:flex;align-items:center;gap:16px;
  padding:12px 16px;
  cursor:pointer;transition:background .15s;
}
.outfit-item:active{background:var(--app-card-soft)}
.outfit-item+.outfit-item{border-top:1px solid var(--app-line)}
.outfit-item-thumb{
  width:56px;height:56px;
  background:var(--app-card-soft);border-radius:14px;
  display:grid;place-items:center;flex-shrink:0;
}
.outfit-item-name{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.outfit-item-sub{font-size:11px;color:var(--app-ink-soft);font-weight:500;margin-top:2px}
.outfit-item-arrow{flex-shrink:0}

/* ── M3 Button ── */
.m3-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:48px;padding:0 24px;border-radius:24px;border:none;
  background:var(--app-accent);color:white;
  font:700 15px/1 "Pretendard",system-ui;
  letter-spacing:-0.01em;cursor:pointer;
  transition:transform .1s,opacity .15s;
  width:100%;margin-top:14px;
}
.m3-btn:active{transform:scale(0.97)}

/* ── M3 Chip ── */
.m3-chip{
  display:inline-flex;align-items:center;gap:6px;
  height:32px;padding:0 12px;border-radius:8px;
  background:transparent;border:1px solid var(--app-line);
  font:600 13px/1 "Pretendard",system-ui;
  color:var(--app-ink);white-space:nowrap;cursor:pointer;
  transition:background .15s;
}
.m3-chip[data-selected="true"]{
  background:var(--app-accent);color:white;border-color:var(--app-accent);
}

/* ── Bottom nav ── */
.bottom-nav{
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 8px calc(12px + var(--safe-bottom));
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--app-line);
  flex-shrink:0;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 0;background:none;border:none;
  color:var(--app-ink-soft);
  font:600 11px/1 "Pretendard",system-ui;
  cursor:pointer;letter-spacing:-0.01em;transition:color .15s;
}
.nav-item.active{color:var(--app-accent)}
.nav-pill{
  height:32px;width:64px;border-radius:16px;
  display:grid;place-items:center;
  transition:background .2s;
}
.nav-item.active .nav-pill{background:rgba(255,138,61,0.15)}
[data-theme="rain"] .nav-item.active .nav-pill,
[data-theme="snow"] .nav-item.active .nav-pill{background:rgba(63,111,176,0.15)}

/* ── List row ── */
.list-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 20px;min-height:56px;
}
.list-row+.list-row{border-top:1px solid var(--app-line)}
.list-row-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--app-card-soft);display:grid;place-items:center;
  flex-shrink:0;color:var(--app-accent-ink);
}
.list-row-text{flex:1;min-width:0}
.list-row-title{font:600 15px/1.3 "Pretendard",system-ui;color:var(--app-ink);letter-spacing:-0.01em}
.list-row-sub{font:400 13px/1.4 "Pretendard",system-ui;color:var(--app-ink-soft);margin-top:2px;letter-spacing:-0.005em}

/* ── M3 Switch ── */
.m3-switch{
  width:52px;height:32px;border-radius:16px;
  background:rgba(0,0,0,.15);
  position:relative;border:none;cursor:pointer;
  transition:background .2s;flex-shrink:0;
}
.m3-switch[data-on="true"]{background:var(--app-accent)}
.m3-switch::after{
  content:"";position:absolute;top:4px;left:4px;
  width:24px;height:24px;border-radius:50%;background:white;
  transition:transform .2s cubic-bezier(0.05,0.7,0.1,1);
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.m3-switch[data-on="true"]::after{transform:translateX(20px)}

/* ── Settings sensitivity btn ── */
.sens-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px;border-radius:16px;
  background:var(--app-card-soft);color:var(--app-ink);
  border:none;text-align:left;cursor:pointer;
  transition:background .15s;width:100%;
  font-family:"Pretendard",system-ui;
}
.sens-btn.active{background:var(--app-accent);color:white}
.sens-radio{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--app-line);
  display:grid;place-items:center;flex-shrink:0;
}
.sens-btn.active .sens-radio{border-color:white}
.sens-radio-dot{width:10px;height:10px;border-radius:50%;background:white;display:none}
.sens-btn.active .sens-radio-dot{display:block}

/* ── Detail screen ── */
.detail-outfit-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
}
.detail-outfit-thumb{
  background:var(--app-card-soft);border-radius:16px;padding:12px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.detail-outfit-thumb-name{font-size:11px;font-weight:600;color:var(--app-ink);margin-top:2px}
.reason-card{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;background:var(--app-card);border-radius:18px;
}
.reason-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--app-accent);color:white;
  display:grid;place-items:center;flex-shrink:0;
}
.reason-title{font:600 15px/1.3 "Pretendard",system-ui;letter-spacing:-0.01em}
.reason-desc{font:400 13px/1.5 "Pretendard",system-ui;color:var(--app-ink-soft);margin-top:2px;letter-spacing:-0.005em}

/* ── Loading screen ── */
#screen-loading{
  position:fixed;inset:0;z-index:99;
  background:linear-gradient(180deg,#FFE6C4,#FFCDA0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .4s;
}
.loading-spinner{
  width:40px;height:40px;border:3px solid rgba(90,34,0,.2);
  border-top-color:#FF8A3D;border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-text{font-size:14px;color:#6B4A2B;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Fade in ── */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-up{animation:fadeInUp .4s ease forwards}
.fade-up-1{animation-delay:.05s;opacity:0}
.fade-up-2{animation-delay:.1s;opacity:0}
.fade-up-3{animation-delay:.15s;opacity:0}
.fade-up-4{animation-delay:.2s;opacity:0}

/* ── Error ── */
.error-wrap{
  padding:32px 20px;text-align:center;
}
.error-emoji{font-size:48px;margin-bottom:12px}
.error-msg{font-size:15px;color:var(--app-ink-soft);line-height:1.6;margin-bottom:20px}
.retry-btn{
  padding:12px 28px;border-radius:24px;
  border:none;background:var(--app-accent);color:white;
  font:600 14px/1 "Pretendard",system-ui;cursor:pointer;
}

/* ── Diurnal alert ── */
.diurnal-alert{
  margin:12px 20px 0;
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;
  background:rgba(255,255,255,0.6);
  border-left:3px solid var(--app-accent);
  border-radius:0 14px 14px 0;
}
.diurnal-alert-icon{font-size:18px;flex-shrink:0}
.diurnal-alert-text{font-size:13px;line-height:1.6;color:var(--app-ink-soft)}
.diurnal-alert-title{font-weight:700;color:var(--app-ink);margin-bottom:1px}

/* ── Weather stats ── */
.weather-stats{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
  margin:16px 20px 0;
}
.weather-stat{
  padding:12px 14px;background:var(--app-card);border-radius:18px;
  display:flex;flex-direction:column;gap:4px;
}
.weather-stat-label{
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;color:var(--app-ink-soft);
}
.weather-stat-val{font-size:20px;font-weight:700;letter-spacing:-0.02em}

/* ── Settings profile ── */
.profile-avatar{
  width:64px;height:64px;border-radius:32px;
  background:linear-gradient(135deg,#FFB85C,#FF8A3D);
  display:grid;place-items:center;
  color:white;font-size:24px;font-weight:800;
  flex-shrink:0;
}

/* ── Scrollbar-free scrollable area ── */
.horiz-scroll{
  overflow-x:auto;scrollbar-width:none;
  -ms-overflow-style:none;
}
.horiz-scroll::-webkit-scrollbar{display:none}

/* ── Update time ── */
.update-time{
  text-align:center;font-size:11px;color:var(--app-ink-soft);
  padding:16px 16px calc(8px + var(--safe-bottom));
  opacity:.7;
}
</style>
</head>
<body>

<!-- Global SVG gradient defs -->
<svg style="display:none" aria-hidden="true">
<defs>
  <linearGradient id="g-knit" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E8B884"/><stop offset="100%" stop-color="#C68852"/>

  </linearGradient>

  </linearGradient>
  <linearGradient id="g-trousers" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#5C5346"/><stop offset="100%" stop-color="#3A3328"/>
  </linearGradient>
  <linearGradient id="g-coat" x1="0%" y1="0%" x2="0%" y2="100%">

  </linearGradient>
  <linearGradient id="g-raincoat" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F4D34A"/><stop offset="100%" stop-color="#D9A82B"/>
  </linearGradient>
  <linearGradient id="g-boots" x1="0%" y1="0%" x2="0%" y2="100%">

  </linearGradient>

  </radialGradient>

    <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#FFEFD8"/>
  </linearGradient>
  <linearGradient id="cloud-rain" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F2F6FA"/><stop offset="100%" stop-color="#9DB1C8"/>
  </linearGradient>
  <linearGradient id="drop-rain" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7AA0CB"/><stop offset="100%" stop-color="#3F6FB0"/>
  </linearGradient>
  <linearGradient id="snow-flake" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E0ECFF"/><stop offset="100%" stop-color="#9DB1C8"/>
  </linearGradient>
</defs>
</svg>

<div id="app-wrapper">
  <div id="screen-loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">날씨 정보를 불러오는 중…</p>
  </div>
  <div id="screen-home" class="app-screen hidden"></div>
  <div id="screen-detail" class="app-screen hidden"></div>
  <div id="screen-settings" class="app-screen hidden" style="background:linear-gradient(180deg,#FFF6EB 0%,#FFFBF5 60%)"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════

const SVG = {
  weatherWarm: (s=120) => `<svg viewBox="0 0 200 200" width="${s}" height="${s}">

      <line x1="120" y1="22" x2="120" y2="32"/><line x1="170" y1="40" x2="163" y2="47"/>
      <line x1="180" y1="78" x2="172" y2="78"/><line x1="60" y1="40" x2="68" y2="48"/>
    </g>
    <ellipse cx="76" cy="124" rx="48" ry="24" fill="url(#cloud-warm)"/>

    <ellipse cx="56" cy="120" rx="22" ry="18" fill="url(#cloud-warm)"/>

// ═══════════════════════════════════════════════════════════
// WEATHER API — Open-Meteo (free, no key, real data for Korea)
// ═══════════════════════════════════════════════════════════
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?`
    + `latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,apparent_temperature,precipitation,precipitation_probability,weathercode,windspeed_10m,relative_humidity_2m,uv_index`
    + `&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,uv_index_max,windspeed_10m_max`
    + `&timezone=Asia%2FSeoul&forecast_days=2&wind_speed_unit=ms`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('날씨 API 오류');
  return r.json();
}

async function fetchLocName(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ko&zoom=14`,
      { headers: { 'Accept-Language': 'ko' } }
    );
    const d = await r.json();
    const a = d.address || {};
    const city = a.city || a.county || a.province || '';
    const sub  = a.suburb || a.neighbourhood || a.quarter || a.town || a.village || '';
    return [city, sub].filter(Boolean).join(' ') || DEFAULT_LOC;
  } catch(e) { return DEFAULT_LOC; }
}

async function getLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) {
      resolve({ lat: DEFAULT_LAT, lon: DEFAULT_LON, name: DEFAULT_LOC });
      return;
    }
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        const name = await fetchLocName(lat, lon);
        resolve({ lat, lon, name });
      },
      () => resolve({ lat: DEFAULT_LAT, lon: DEFAULT_LON, name: DEFAULT_LOC }),
      { timeout: 8000, maximumAge: 300000 }
    );
  });
}

// ═══════════════════════════════════════════════════════════
// OUTFIT LOGIC
// ═══════════════════════════════════════════════════════════
function isRainy(code) { return code >= 51 && code <= 82; }
function isSnowy(code) { return (code >= 71 && code <= 77) || code === 85 || code === 86; }
function isThunder(code) { return code >= 95; }

function getTheme(code, feelsLike) {
  if (isThunder(code) || isRainy(code)) return 'rain';
  if (isSnowy(code)) return 'snow';
  if (feelsLike >= 26) return 'hot';
  return 'warm';
}

function getWeatherIllus(code, feelsLike) {
  if (isRainy(code) || isThunder(code)) return 'weatherRain';
  if (isSnowy(code)) return 'weatherSnow';
  if (code <= 1 && feelsLike >= 20) return 'weatherClear';
  return 'weatherWarm';
}

function getOutfit(feelsLike, sensitivity, rainProb, weathercode) {
  const adj = feelsLike + SENS_OFFSET[sensitivity];
  const tier = TIERS.find(t => adj >= t.min) || TIERS[TIERS.length - 1];

  let items = [...tier.items];
  const isRain = isRainy(weathercode) || isThunder(weathercode) || rainProb >= 50;

  if (isRain) {
    // Replace first outer layer with raincoat
    const outerIdx = items.findIndex(i => ['coat','trench','cardigan'].includes(i));
    if (outerIdx >= 0) items[outerIdx] = 'raincoat';
    else items.unshift('raincoat');
    // Add umbrella if not present
    if (!items.includes('umbrella')) items.push('umbrella');
  }

  return { tier, items: items.slice(0, 5), isRain,
    score: tier.score,
    mood: SENS_LABEL[sensitivity] + ' · ' + tier.mood,
    catchphrase: isRain ? '비를 대비한 코디예요' : tier.catchphrase,
  };
}

function getMood(temp, code) {
  if (isThunder(code)) return '천둥';
  if (isSnowy(code)) return '눈';
  if (isRainy(code)) return code >= 61 ? '비' : '가랑비';
  if (code >= 45) return '안개';
  if (temp >= 28) return '더워';
  if (temp >= 22) return '포근';
  if (temp >= 17) return '선선';
  if (temp >= 12) return '쌀쌀';
  if (temp >= 5)  return '추워';
  return '매우춥';
}

function getTimelineSlots(hourly, weathercode) {
  const now    = new Date();
  const today  = now.toISOString().split('T')[0];
  const target = [9, 12, 15, 18, 21];
  const slots  = [];

  for (const h of target) {
    const key = `${today}T${String(h).padStart(2,'0')}:00`;
    const idx = hourly.time.indexOf(key);
    if (idx < 0) continue;
    const temp = Math.round(hourly.temperature_2m[idx]);
    const rain = hourly.precipitation_probability[idx] || 0;
    const code = hourly.weathercode[idx];
    slots.push({ label:`${h}시`, h, temp, rain, code, past: h < now.getHours() });
  }

  // Fill with tomorrow if short
  if (slots.filter(s=>!s.past).length < 3) {
    const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
    const tmrStr = tmr.toISOString().split('T')[0];
    for (const h of target) {
      if (slots.length >= 5) break;
      const key = `${tmrStr}T${String(h).padStart(2,'0')}:00`;
      const idx = hourly.time.indexOf(key);
      if (idx < 0) continue;
      slots.push({
        label:`내일 ${h}시`, h, past:false,
        temp: Math.round(hourly.temperature_2m[idx]),
        rain: hourly.precipitation_probability[idx] || 0,
        code: hourly.weathercode[idx],
      });
    }
  }

  // Find peak index
  const rain = isRainy(weathercode) || isThunder(weathercode);
  let peakIdx = 0, peakVal = -999;
  slots.forEach((s, i) => {
    const v = rain ? s.rain : s.temp;
    if (v > peakVal) { peakVal = v; peakIdx = i; }
  });
  slots.forEach((s, i) => { s.isPeak = i === peakIdx; });
  return slots;
}

function getDiurnalAlert(tMin, tMax, eveningTemp) {
  const diff = tMax - tMin;
  if (diff >= 10) return { title:'일교차 주의 🌡️', body:`오늘 일교차 ${Math.round(diff)}°. 벗고 입기 쉬운 겉옷이 필수예요.` };
  if (diff >= 8)  return { title:'일교차가 큰 날이에요', body:`낮과 저녁 온도 차가 커요. 레이어드를 추천해요.` };
  if (eveningTemp !== null && eveningTemp <= 10) {
    return { title:'저녁에 쌀쌀해요', body:`퇴근 무렵 ${Math.round(eveningTemp)}°까지 내려가요. 겉옷을 꼭 챙기세요.` };
  }
  return null;
}

    { id:'me',    label:'MY',     icon: (a) => ICON.user(20, a?'var(--app-accent)':'var(--app-ink-soft)') },
  ];
  return `<nav class="bottom-nav">${tabs.map(t => {
    const on = t.id === active;
    return `<button class="nav-item${on?' active':''}" data-nav="${t.id}">
      <span class="nav-pill">${t.icon(on)}</span>${t.label}

  }).join('')}</nav>`;
}

function formatDate(d) {
  const DAYS = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS[d.getDay()]}요일`;
}

        <div style="font-size:14px;color:var(--app-ink-soft);margin-top:4px;letter-spacing:-0.005em">${isRain?'비 오는 날에도 산뜻하게':'오늘의 데일리 코디'}</div>
      </div>

      <div style="margin:16px 20px 0;background:var(--app-card);border-radius:24px;padding:24px;position:relative">
        <div class="detail-outfit-grid">
          ${outfit.items.map(key => {
            const meta = ITEM_META[key] || { name: key };
            return `<div class="detail-outfit-thumb">
              ${SVG[key] ? SVG[key](68) : ''}
              <div class="detail-outfit-thumb-name">${meta.name}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div style="padding:24px 20px 0">
        <div style="font-size:19px;font-weight:700;letter-spacing:-0.02em;margin-bottom:12px">왜 이 코디일까?</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${reasons.map(r => `
            <div class="reason-card">
              <div class="reason-icon">${r.icon}</div>
              <div>
                <div class="reason-title">${r.title}</div>
                <div class="reason-desc">${r.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="padding:20px 20px 0">
        <div style="font-size:14px;font-weight:600;color:var(--app-ink-soft);margin-bottom:10px">이 추천 어땠어요?</div>
        <div style="display:flex;gap:8px">
          ${['딱 좋아요 🙆','좀 더워요 🥵','좀 추워요 🥶'].map(t =>
            `<button class="m3-chip" style="flex:1;justify-content:center;height:40px;font-size:12px">${t}</button>`
          ).join('')}
        </div>
      </div>
    </div>
  `;

  screen.querySelector('#btn-back-detail').onclick = () => showScreen('home');
  screen.querySelectorAll('.m3-chip').forEach(btn => {
    btn.onclick = () => {
      btn.setAttribute('data-selected','true');
      setTimeout(() => showScreen('home'), 600);
    };
  });
}

// ═══════════════════════════════════════════════════════════
// SCREEN: SETTINGS

      <div style="flex:1;text-align:center;font-size:17px;font-weight:600;letter-spacing:-0.01em;color:#2A1500">개인 설정</div>
      <div style="width:44px"></div>
    </div>

    <div class="app-scroll" style="padding:8px 0 24px">
      <div style="padding:0 20px 16px;display:flex;align-items:center;gap:14px">
        <div class="profile-avatar">지</div>
        <div>
          <div style="font-size:19px;font-weight:700;letter-spacing:-0.02em;color:#2A1500">지수님</div>
          <div style="font-size:13px;color:#6B4A2B;margin-top:2px">가입한 지 1일 · 코디 추천 받는 중</div>
        </div>
      </div>

      <div style="padding:0 20px">
        <div style="font-size:13px;font-weight:600;color:#6B4A2B;margin-bottom:10px;padding-left:4px">추위·더위 민감도</div>
        <div style="background:white;border-radius:24px;padding:16px;display:flex;flex-direction:column;gap:8px">
          ${[
            { id:'cold',   e:'🥶', t:'추위 많이 타요',  d:'한 겹 더 두텁게 추천' },
            { id:'normal', e:'🙂', t:'보통이에요',       d:'기상청 기준 그대로' },
            { id:'warm',   e:'🥵', t:'더위 많이 타요',  d:'한 겹 가볍게 추천' },
          ].map(o => `
            <button class="sens-btn${STATE.sensitivity===o.id?' active':''}" data-sens="${o.id}">
              <span style="font-size:28px">${o.e}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:15px;font-weight:600;letter-spacing:-0.01em">${o.t}</div>

        <div style="background:white;border-radius:24px;padding:16px">
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${[['캐주얼',true],['미니멀',true],['스트릿',false],['포멀',false],['빈티지',true],['스포티',false]].map(([l,on])=>
              `<span class="m3-chip" data-selected="${on}" style="--app-accent:#FF8A3D;--app-line:rgba(92,34,0,.15)">${l}</span>`

      saveSettings();

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  ['home','detail','settings'].forEach(s => {
    document.getElementById('screen-' + s).classList.toggle('hidden', s !== id);
  });
  document.getElementById('screen-loading').style.display = 'none';
  STATE.currentScreen = id;
}

// ═══════════════════════════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════════════════════════
async function refreshWeather() {
  const btn = document.querySelector('#btn-refresh');
  if (btn) { btn.style.animation = 'spin .8s linear infinite'; btn.disabled = true; }
  try {
    STATE.weather = await fetchWeather(STATE.lat, STATE.lon);
    renderHome();
  } catch(e) {
    console.error(e);
  } finally {
    if (btn) { btn.style.animation = ''; btn.disabled = false; }
  }
}

async function refreshLocation() {
  const btn = document.querySelector('#btn-loc');
  if (btn) btn.style.opacity = '.5';
  try {
    const loc = await getLocation();
    STATE.lat = loc.lat; STATE.lon = loc.lon; STATE.locName = loc.name;
    STATE.weather = await fetchWeather(STATE.lat, STATE.lon);
    renderHome();
  } catch(e) {
    console.error(e);
  } finally {
    if (btn) btn.style.opacity = '';
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  loadSettings();

  try {
    // Attempt geolocation + weather in parallel (location first)
    const loc = await getLocation();
    STATE.lat = loc.lat; STATE.lon = loc.lon; STATE.locName = loc.name;

    STATE.weather = await fetchWeather(STATE.lat, STATE.lon);

    renderHome();
    renderDetail();
    renderSettings();

    // Fade out loading
    const loading = document.getElementById('screen-loading');
    loading.style.opacity = '0';
    setTimeout(() => { showScreen('home'); }, 400);

  } catch(err) {
    console.error(err);
    const loading = document.getElementById('screen-loading');
    loading.innerHTML = `
      <div class="error-wrap">
        <div class="error-emoji">🌥️</div>
        <p class="error-msg">날씨 정보를 불러오지 못했어요.<br>인터넷 연결을 확인해주세요.</p>
        <button class="retry-btn" onclick="init()">다시 시도</button>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
